<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCA Analyzer — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#0A0A12; color:#E8E8F0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,150,42,0.08) 0%, transparent 60%); pointer-events:none; }
  .box { position:relative; width:100%; max-width:420px; padding:24px; }
  .logo { text-align:center; margin-bottom:40px; }
  .logo-badge { display:inline-block; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#C8962A; border:1px solid #3A2A10; padding:6px 16px; border-radius:2px; background:#1A1200; margin-bottom:16px; }
  h1 { font-family:'DM Serif Display',serif; font-size:36px; color:#E2B96F; line-height:1.1; }
  h1 em { font-style:italic; color:#C8962A; }
  .card { background:#0F0F1E; border:1px solid #2A2A3E; border-radius:6px; padding:36px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
  .field { margin-bottom:20px; }
  label { display:block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8888AA; margin-bottom:8px; }
  input { width:100%; padding:13px 16px; background:#1A1A2E; border:1px solid #2A2A3E; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:15px; color:#E8E8F0; outline:none; transition:border-color .2s; }
  input:focus { border-color:#C8962A; box-shadow:0 0 0 3px rgba(200,150,42,0.1); }
  input::placeholder { color:#444466; }
  .btn { width:100%; padding:14px; background:linear-gradient(135deg,#C8962A,#8B6010); color:#0A0A12; border:none; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; letter-spacing:.04em; cursor:pointer; margin-top:8px; transition:all .2s; }
  .btn:hover { background:linear-gradient(135deg,#D4A030,#9B7020); transform:translateY(-1px); box-shadow:0 4px 16px rgba(200,150,42,0.3); }
  .error { background:#2A0810; border:1px solid #4A1520; border-radius:4px; padding:12px 16px; color:#FF6B6B; font-size:13px; margin-bottom:20px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-badge">MCA Underwriting Suite</div>
    <h1>Bank Statement<br><em>Analyzer</em></h1>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
